    <title>Télécharger Proximity</title>
    <script>
      const userAgent = navigator.userAgent || navigator.vendor;
      if (/iPad|iPhone|iPod/.test(userAgent)) {
        window.location.href = "https://apps.apple.com/app/id6769840136";
      } else if (/android/i.test(userAgent)) {
        window.location.href = "https://play.google.com/store/apps/details?id=fr.proximityapp";
      } else {
        window.location.href = "https://apps.apple.com/app/id6769840136";
      }
    </script>
